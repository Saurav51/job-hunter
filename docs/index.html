<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Hunter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      color: #fff;
      padding: 20px 32px;
    }

    header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.01em; }
    header p  { font-size: 0.8rem; color: #888; margin-top: 4px; }

    main { max-width: 800px; margin: 32px auto; padding: 0 16px; }

    #status { color: #666; font-size: 0.9rem; margin-bottom: 16px; }

    .run {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .run-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }

    .run-header:hover { background: #fafafa; }

    .run-meta { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }

    .run-num {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      background: #f0f0f0;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .run-date { font-size: 0.875rem; color: #444; }

    .run-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .run-badge.has-jobs  { background: #dcfce7; color: #166534; }
    .run-badge.no-jobs   { background: #f3f4f6; color: #6b7280; }

    .run-arrow {
      font-size: 0.7rem;
      color: #aaa;
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    .run.open .run-arrow { transform: rotate(90deg); }

    .run-body {
      display: none;
      border-top: 1px solid #e5e5e5;
      padding: 16px 18px;
    }

    .run.open .run-body { display: block; }

    .no-jobs-msg { font-size: 0.875rem; color: #888; }

    .company {
      margin-bottom: 16px;
      border-left: 3px solid var(--co-color, #6b7280);
      padding-left: 12px;
    }
    .company:last-child { margin-bottom: 0; }

    .company-name {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: capitalize;
      letter-spacing: 0.01em;
      color: #fff;
      background: var(--co-color, #6b7280);
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .job {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .job:last-child { border-bottom: none; }

    .co-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--co-color, #6b7280);
      flex-shrink: 0;
    }

    .role-badge {
      font-size: 0.68rem;
      font-weight: 600;
      background: #f3f4f6;
      color: #374151;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .loc-badge {
      font-size: 0.68rem;
      background: #eff6ff;
      color: #3b82f6;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .job a {
      font-size: 0.875rem;
      color: #1a1a1a;
      text-decoration: none;
    }

    .job a:hover { text-decoration: underline; color: #1d4ed8; }

    .loading { color: #888; font-size: 0.875rem; }
    .error   { color: #dc2626; font-size: 0.875rem; }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;">
    <div>
      <h1>Job Hunter</h1>
      <p style="margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <span style="font-size:0.7rem;color:#666;">tracking</span>
        <span style="font-size:0.78rem;font-weight:600;color:#d97706;">Anthropic</span>
        <span style="color:#444;font-size:0.7rem;">·</span>
        <span style="font-size:0.78rem;font-weight:600;color:#059669;">OpenAI</span>
        <span style="color:#444;font-size:0.7rem;">·</span>
        <span style="font-size:0.78rem;font-weight:600;color:#7c3aed;">Perplexity</span>
        <span style="color:#444;font-size:0.7rem;">·</span>
        <span style="font-size:0.78rem;font-weight:600;color:#2563eb;">Ramp</span>
        <span style="color:#444;font-size:0.7rem;">·</span>
        <span style="font-size:0.78rem;font-weight:600;color:#a1a1aa;">Uber</span>
        <span style="color:#444;font-size:0.7rem;">·</span>
        <span style="font-size:0.78rem;font-weight:600;color:#4285f4;">Google</span>
        <span style="color:#444;font-size:0.7rem;">·</span>
        <span style="font-size:0.78rem;font-weight:600;color:#e50914;">Netflix</span>
        <span style="color:#444;font-size:0.7rem;">·</span>
        <span style="font-size:0.78rem;font-weight:600;color:#ff3008;">DoorDash</span>
        <span style="color:#444;font-size:0.7rem;">·</span>
        <span style="font-size:0.78rem;font-weight:600;color:#29B5E8;">Snowflake</span>
      </p>
    </div>
    <a href="https://github.com/Saurav51/job-hunter/actions/workflows/job-check.yml"
       target="_blank" rel="noopener"
       style="display:inline-block;background:#fff;color:#1a1a1a;font-size:0.8rem;font-weight:600;padding:8px 14px;border-radius:6px;text-decoration:none;white-space:nowrap;">
      Run Job
    </a>
  </div>
</header>

<main>
  <div id="status" class="loading">Loading runs…</div>
  <div id="runs"></div>
</main>

<script>
  const REPO   = 'Saurav51/job-hunter';
  const BRANCH = 'main';
  const API    = `https://api.github.com/repos/${REPO}/contents/results`;
  const RAW    = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/results`;

  function parseFilename(name) {
    // e.g. "7_2026-04-05_18-42-51.json"
    const [num, date, time] = name.replace('.json', '').split('_');
    const dt = `${date} ${time.replace(/-/g, ':')}`;
    return { num: parseInt(num), label: `Run #${num}`, datetime: dt };
  }

  function countJobs(data) {
    return Object.values(data).reduce((sum, jobs) => sum + jobs.length, 0);
  }

  const COMPANY_COLORS = {
    anthropic:  '#d97706',
    openai:     '#059669',
    perplexity: '#7c3aed',
    ramp:       '#2563eb',
    uber:       '#3f3f46',
    google:     '#4285f4',
    netflix:    '#e50914',
    doordash:   '#ff3008',
    snowflake:  '#29B5E8',
  };

  function companyColor(name) {
    return COMPANY_COLORS[name.toLowerCase()] || '#6b7280';
  }

  function renderJobs(data) {
    const total = countJobs(data);
    if (total === 0) {
      return `<p class="no-jobs-msg">No new jobs this run.</p>`;
    }
    return Object.entries(data).map(([company, jobs]) => {
      if (!jobs.length) return '';
      const color = companyColor(company);
      const jobsHtml = jobs.map(j => `
        <div class="job">
          <span class="co-dot"></span>
          ${j.role ? `<span class="role-badge">${esc(j.role)}</span>` : ''}
          ${j.location ? `<span class="loc-badge">${esc(j.location)}</span>` : ''}
          <a href="${esc(j.link)}" target="_blank" rel="noopener">${esc(j.title)}</a>
        </div>`).join('');
      return `
        <div class="company" style="--co-color:${color}">
          <div class="company-name">${esc(company)}</div>
          ${jobsHtml}
        </div>`;
    }).join('');
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function buildRun(file, meta) {
    const el = document.createElement('div');
    el.className = 'run';
    el.innerHTML = `
      <div class="run-header">
        <div class="run-meta">
          <span class="run-num">#${meta.num}</span>
          <span class="run-date">${meta.datetime}</span>
        </div>
        <span class="run-badge no-jobs">Loading…</span>
        <span class="run-arrow">▶</span>
      </div>
      <div class="run-body"><p class="loading">Loading…</p></div>`;

    const header = el.querySelector('.run-header');
    const badge  = el.querySelector('.run-badge');
    const body   = el.querySelector('.run-body');
    let loaded   = false;

    async function load() {
      if (loaded) return;
      loaded = true;
      try {
        const res  = await fetch(`${RAW}/${file.name}`);
        const data = await res.json();
        const n    = countJobs(data);
        badge.textContent = n ? `${n} new job${n > 1 ? 's' : ''}` : 'No new jobs';
        badge.className   = `run-badge ${n ? 'has-jobs' : 'no-jobs'}`;
        body.innerHTML    = renderJobs(data);
      } catch (e) {
        badge.textContent = 'Error';
        body.innerHTML    = `<p class="error">Failed to load.</p>`;
      }
    }

    header.addEventListener('click', () => {
      el.classList.toggle('open');
      if (el.classList.contains('open')) load();
    });

    // Auto-load badge count without expanding
    load();

    return el;
  }

  async function init() {
    const status = document.getElementById('status');
    const runs   = document.getElementById('runs');

    try {
      const res   = await fetch(API);
      if (!res.ok) throw new Error(res.statusText);
      const files = await res.json();

      const jsonFiles = files
        .filter(f => f.name.endsWith('.json'))
        .sort((a, b) => {
          const na = parseInt(a.name.split('_')[0]);
          const nb = parseInt(b.name.split('_')[0]);
          return nb - na; // newest first
        });

      status.textContent = `${jsonFiles.length} run${jsonFiles.length !== 1 ? 's' : ''} found`;

      for (const file of jsonFiles) {
        const meta = parseFilename(file.name);
        runs.appendChild(buildRun(file, meta));
      }
    } catch (e) {
      status.className   = 'error';
      status.textContent = `Failed to load runs: ${e.message}`;
    }
  }

  init();
</script>
</body>
</html>
